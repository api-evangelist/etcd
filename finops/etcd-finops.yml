meters:
  - name: compute_hours
    unit: instance-hour
    aggregation: sum
    dimensions:
      - cluster
      - region
      - instance_type
  - name: ssd_storage
    unit: GB-month
    aggregation: max
    dimensions:
      - cluster
      - region
  - name: backup_storage
    unit: GB-month
    aggregation: max
    dimensions:
      - cluster
  - name: network_egress
    unit: GB
    aggregation: sum
    dimensions:
      - cluster
      - region
principles:
  - name: Visibility
    description: Scrape etcd's Prometheus metrics (mvcc_db_total_size_in_bytes, disk fsync latency, leader
      changes) and join with cloud cost data per cluster.
  - name: Allocation
    description: Tag etcd nodes/disks per cluster and per environment so platform-team cost is attributable
      to consuming Kubernetes/control-plane workloads.
  - name: Optimization
    description: Co-locate etcd peers on low-latency NVMe SSD; right-size CPU/memory; use defrag and
      compaction to keep DB small; consolidate small clusters where multi-tenant model permits.
  - name: Accountability
    description: Platform team owns etcd cluster cost; charge back to consuming Kubernetes control-plane
      tenants on a per-cluster or per-namespace basis.
