specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Etcd
providerId: etcd
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - FinOps
  - FOCUS
  - Open Source
  - Distributed Systems
  - Kubernetes
description: 'FinOps view of etcd: no vendor invoice. Direct cost is the underlying compute, storage
  (low-latency SSD), and networking required to run a quorum-typically-3 cluster. When etcd is consumed
  via managed Kubernetes (EKS, GKE, AKS), its cost is bundled into the control-plane fee on the cloud
  bill.'
sources:
  - https://etcd.io/
  - https://www.cncf.io/projects/etcd/
notes: No vendor invoice from the etcd project. FinOps surface is infrastructure cost (self-hosted) or
  a portion of managed-Kubernetes control-plane spend.
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
