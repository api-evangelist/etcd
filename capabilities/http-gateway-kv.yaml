naftiko: 1.0.0-alpha2
info:
  label: etcd HTTP Gateway API — KV
  description: 'etcd HTTP Gateway API — KV. 5 operations. Lead operation: Etcd Compact the event history. Self-contained Naftiko
    capability covering one Etcd business surface.'
  tags:
  - Etcd
  - KV
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ETCD_API_KEY: ETCD_API_KEY
capability:
  consumes:
  - type: http
    namespace: http-gateway-kv
    baseUri: http://{host}:{port}/v3
    description: etcd HTTP Gateway API — KV business capability. Self-contained, no shared references.
    resources:
    - name: kv-compaction
      path: /kv/compaction
      operations:
      - name: kvcompact
        method: POST
        description: Etcd Compact the event history
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: kv-deleterange
      path: /kv/deleterange
      operations:
      - name: kvdeleterange
        method: POST
        description: Etcd Delete a range of key-value pairs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: kv-put
      path: /kv/put
      operations:
      - name: kvput
        method: POST
        description: Etcd Put a key-value pair
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: kv-range
      path: /kv/range
      operations:
      - name: kvrange
        method: POST
        description: Etcd Get a range of key-value pairs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: kv-txn
      path: /kv/txn
      operations:
      - name: kvtxn
        method: POST
        description: Etcd Execute a transaction
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.ETCD_API_KEY}}'
  exposes:
  - type: rest
    namespace: http-gateway-kv-rest
    port: 8080
    description: REST adapter for etcd HTTP Gateway API — KV. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/kv/compaction
      name: kv-compaction
      description: REST surface for kv-compaction.
      operations:
      - method: POST
        name: kvcompact
        description: Etcd Compact the event history
        call: http-gateway-kv.kvcompact
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/kv/deleterange
      name: kv-deleterange
      description: REST surface for kv-deleterange.
      operations:
      - method: POST
        name: kvdeleterange
        description: Etcd Delete a range of key-value pairs
        call: http-gateway-kv.kvdeleterange
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/kv/put
      name: kv-put
      description: REST surface for kv-put.
      operations:
      - method: POST
        name: kvput
        description: Etcd Put a key-value pair
        call: http-gateway-kv.kvput
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/kv/range
      name: kv-range
      description: REST surface for kv-range.
      operations:
      - method: POST
        name: kvrange
        description: Etcd Get a range of key-value pairs
        call: http-gateway-kv.kvrange
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/kv/txn
      name: kv-txn
      description: REST surface for kv-txn.
      operations:
      - method: POST
        name: kvtxn
        description: Etcd Execute a transaction
        call: http-gateway-kv.kvtxn
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: http-gateway-kv-mcp
    port: 9090
    transport: http
    description: MCP adapter for etcd HTTP Gateway API — KV. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: etcd-compact-event-history
      description: Etcd Compact the event history
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: http-gateway-kv.kvcompact
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: etcd-delete-range-key-value
      description: Etcd Delete a range of key-value pairs
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: http-gateway-kv.kvdeleterange
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: etcd-put-key-value-pair
      description: Etcd Put a key-value pair
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: http-gateway-kv.kvput
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: etcd-get-range-key-value
      description: Etcd Get a range of key-value pairs
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: http-gateway-kv.kvrange
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: etcd-execute-transaction
      description: Etcd Execute a transaction
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: http-gateway-kv.kvtxn
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
