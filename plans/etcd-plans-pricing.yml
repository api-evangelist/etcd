specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Etcd
providerId: etcd
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Distributed Systems
  - Key-Value Store
  - Open Source
  - Kubernetes
description: etcd is a CNCF graduated, Apache 2.0 licensed distributed key-value store. It is self-hosted
  open-source software with no commercial pricing from the etcd project. Managed etcd is offered indirectly
  via Kubernetes-as-a-service offerings (EKS, GKE, AKS) where etcd is bundled into the control-plane
  fee — those costs are billed by the cloud provider, not by etcd.
sources:
  - https://etcd.io/
  - https://www.cncf.io/projects/etcd/
notes: No public pricing for etcd itself; it is freely downloadable open-source software. Managed-etcd
  pricing is part of Kubernetes-control-plane fees from cloud providers and must be reconciled against
  those vendors.
plans:
  - id: etcd-open-source
    name: Open Source
    type: freemium
    description: etcd distributed under the Apache 2.0 license. Self-hosted, no usage fees, community
      support via GitHub and CNCF Slack.
    entries:
      - label: Software license
        name: license
        type: flat
        metric: license
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Apache 2.0 license
      - name: Community support (GitHub, CNCF Slack)
      - name: gRPC and HTTP/JSON gateway
      - name: Watch, lease, and transaction APIs
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
