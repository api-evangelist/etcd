      required:
        - name
      properties:
        name:
          type: string
          description: Name for the new role
    AuthRoleAddResponse:
      type: object
      description: Response from a role add operation
      properties:
        header:
          $ref: '#/components/schemas/ResponseHeader'
    AuthRoleGetRequest:
      type: object
      description: Request to get role details
      required:
        - role
      properties:
        role:
          type: string
          description: Name of the role to retrieve
    Permission:
      type: object
